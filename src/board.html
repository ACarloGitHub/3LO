<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3LO - Board</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <button id="back" class="btn-secondary">← Back</button>
        <div class="board-title-container">
          <h1 id="board-title" contenteditable="true" spellcheck="false">Board</h1>
        </div>
        <button id="add-list" class="btn-primary">+ New List</button>
        <div class="zoom-controls">
          <button id="zoom-out" class="btn-zoom" title="Zoom Out (-)">−</button>
          <button id="zoom-reset" class="btn-zoom" title="Reset Zoom (Ctrl+0)">100%</button>
          <button id="zoom-in" class="btn-zoom" title="Zoom In (+)">+</button>
        </div>
      </header>
      <div class="board-container"><div class="board" id="board"></div></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="./db.js"></script>
    <script src="./board.js"></script>
  
    <!-- Footer -->
    <div class="app-footer"003e
      <button id="template-ai-btn" class="footer-btn"003eAI Template</button>
      <button id="help-btn" class="footer-btn" title="Instructions"003eHelp</button>
    </div>

    <script type="module" src="./template_ai.js"003e</script>
    <script type="module" src="./settings.js"003e</script>
  </body>
</html>
<!-- Settings Sidebar -->
<div id="settings-sidebar" class="settings-sidebar">
  <div class="settings-header">
    <h3>⚙️ Settings</h3>
    <button id="close-settings" class="close-settings-btn">&times;</button>
  </div>
  
  <div class="settings-content">
    <div class="settings-section">
      <h4>🎨 Colors</h4>
      
      <div class="color-setting">
        <label>Header</label>
        <input type="color" id="color-header" value="#1a1a2e">
      </div>
      
      <div class="color-setting">
        <label>Background</label>
        <input type="color" id="color-background" value="#16213e">
      </div>
      
      <div class="color-setting">
        <label>Footer</label>
        <input type="color" id="color-footer" value="#0f0f23">
      </div>
      
      <div class="color-setting">
        <label>Project Cards</label>
        <input type="color" id="color-projects" value="#6366f1">
      </div>
      
      <div class="color-setting">
        <label>Columns</label>
        <input type="color" id="color-columns" value="#6366f1">
      </div>
      
      <div class="color-setting">
        <label>Cards</label>
        <input type="color" id="color-cards" value="#4c51bf">
      </div>
    </div>
    
    <button id="reset-colors" class="reset-colors-btn">↺ Reset to Default</button>
  </div>
</div>
<div id="settings-overlay" class="settings-overlay"></div>

<script src="./settings.js"></script>
