<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3LO - Projects</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="logo-container">
          <img src="./icons/logo.svg" alt="3LO" class="header-logo" />
          <span class="logo-text">3LO</span>
        </div>
        <div class="header-actions">
          <button id="import-project" class="btn-secondary">↓ Import</button>
          <input type="file" id="import-file" accept=".json" style="display: none;">
          <button id="new-project" class="btn-primary">+ New Project</button>
        </div>
      </header>
      <div class="projects-container" id="projects"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script type="module" src="./home.js"></script>
  </body>
</html>
