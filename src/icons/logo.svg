<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Sfondo gradiente -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Cerchio sfondo -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" stroke="#6366f1" stroke-width="2"/>
  
  <!-- Luna crescente stilizzata che forma il 3 -->
  <path d="M 100 40 
           C 140 40, 160 70, 160 100
           C 160 130, 140 160, 100 160
           C 70 160, 50 140, 50 120
           C 50 140, 70 150, 100 150
           C 130 150, 150 125, 150 100
           C 150 75, 130 50, 100 50
           C 80 50, 65 60, 55 75
           L 45 70
           C 55 50, 75 40, 100 40 Z" 
        fill="url(#moonGrad)" 
        filter="url(#glow)"/>
  
  <!-- Stella piccola -->
  <circle cx="70" cy="85" r="3" fill="#fff" opacity="0.8"/>
  
  <!-- Testo 3LO -->
  <text x="100" y="185" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="14" 
        font-weight="600"
        fill="#fff" 
        text-anchor="middle"
        opacity="0.9">3LO</text>
</svg>